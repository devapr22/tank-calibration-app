<head>
    <title>Tank Calibration App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container dashboard-container">
        <h1>Tank Calibration </h1>

        <div class="dashboard-cards">
            <div class="card">
                <h2 id="companyCount">0</h2>
                <p>Companies</p>
            </div>
            <div class="card">
                <h2 id="tankCount">0</h2>
                <p>Tanks</p>
            </div>
            <div class="card">
                <h2 id="deadwoodCount">0</h2>
                <p>Deadwoods</p>
            </div>
        </div>

        <div class="button-container">
            <button onclick="showCompanies()">Company Details</button>
            <button onclick="openStrapping()">Strapping Details</button>
            <button onclick="openDeadwoods()">Deadwoods</button>
        </div>
    </div>
